# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================
set -g base-index 1
set -g pane-base-index 1
setw -g mouse on
set -g renumber-windows on
set -g set-titles on
set -g window-size latest
setw -g aggressive-resize on
set -g status-position top
set -g detach-on-destroy off

# ==============================================================================
# PREFIX & CONFIG
# ==============================================================================
set -g prefix C-a 
bind -N "Send prefix (C-a)" C-a send-prefix

bind -N "Reload tmux configuration" R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

setw -g mode-keys vi
set -g status-keys vi

# ==============================================================================
# PANE MANAGEMENT (SPLITS & NAVIGATION)
# ==============================================================================
bind -N "Split pane horizontally" '\' split-window -h
bind -N "Split pane vertically" - split-window -v

bind -N "Select pane to the left" h select-pane -L
bind -N "Select pane below" j select-pane -D
bind -N "Select pane above" k select-pane -U
bind -N "Select pane to the right" l select-pane -R

bind-key -r -N "Resize pane down" M-j resize-pane -D 3
bind-key -r -N "Resize pane up" M-k resize-pane -U 3
bind-key -r -N "Resize pane left" M-h resize-pane -L 3
bind-key -r -N "Resize pane right" M-l resize-pane -R 3

bind -N "Kill the current pane" x kill-pane

# ==============================================================================
# WINDOW MANAGEMENT
# ==============================================================================
bind -r -N "Select previous window" H previous-window
bind -r -N "Select next window" L next-window

bind -r -N "Swap window left" C-S-h swap-window -t -1 \; select-window -t -1
bind -r -N "Swap window right" C-S-l swap-window -t +1 \; select-window -t +1

bind -N "Switch to last active window" Tab last-window  

# ==============================================================================
# SESSION & SYSTEM
# ==============================================================================
# "Arm on Arrival" hooks
set-hook -g client-attached 'set-option destroy-unattached on'
set-hook -g client-session-changed 'set-option destroy-unattached on'

unbind d
bind -N "Smart session switch (script)" d run-shell "$XDG_CONFIG_HOME/tmux/smart-switch '#S'"

# ==============================================================================
# COPY MODE (VI STYLE)
# ==============================================================================
bind -N "Enter copy mode" Enter copy-mode 

# These are bound in the copy-mode-vi table
bind -T copy-mode-vi -N "Start visual selection" v send -X begin-selection
bind -T copy-mode-vi -N "Toggle block selection" C-v send -X rectangle-toggle
bind -T copy-mode-vi -N "Copy selection and exit" y send -X copy-selection-and-cancel
bind -T copy-mode-vi -N "Cancel selection/Copy mode" Escape send -X cancel
bind -T copy-mode-vi -N "Move to start of line" H send -X start-of-line
bind -T copy-mode-vi -N "Move to end of line" L send -X end-of-line

# ==============================================================================
# HELP & POPUPS
# ==============================================================================
# This popup will now show all the notes added above
unbind ?
bind -N "Display this help list" ? display-popup -E -w 80% -h 80% "tmux list-keys -N | fzf"

# ==============================================================================
# PLUGINS
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'uhs-robert/tmux-oasis'
set -g @oasis_flavor "mirage_dark"

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
